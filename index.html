<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bastien Allemand | Portfolio</title>
    <style>
      :root {
        color-scheme: light dark;
        --page-bg: #f8fafc;
        --page-fg: #0f172a;
        --card-bg: #ffffff;
        --link-color: #2563eb;
        --shadow: rgba(15, 23, 42, 0.12);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --page-bg: #0f172a;
          --page-fg: #e2e8f0;
          --card-bg: rgba(15, 23, 42, 0.8);
          --link-color: #93c5fd;
          --shadow: rgba(2, 6, 23, 0.5);
        }
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: var(--page-bg);
        color: var(--page-fg);
      }
      main {
        width: min(600px, 92vw);
        padding: 2rem;
        border-radius: 12px;
        background: var(--card-bg);
        box-shadow: 0 10px 40px var(--shadow);
      }
      h1 {
        margin-top: 0;
      }
      a {
        color: var(--link-color);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bastien Allemand</h1>
      <p>Welcome to my GitHub Pages website.</p>
      <p>
        Find my projects on
        <a href="https://github.com/Bastien-Allemand">GitHub</a>.
      </p>
    </main>
  </body>
</html>
